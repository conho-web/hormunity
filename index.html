<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  <title>Hormunity</title>
</head>

<body>
  <section id="main" class="main">
    <header class="header">
      <div class="header__container">
        <img src="./assets/icons/common/logo.svg" alt="Hormunity">
        <nav class="header__links">
          <a href="/" class="header__link">Shop</a>
          <a href="/" class="header__link">Labworks</a>
          <a href="/" class="header__link">Blood tests</a>
          <a href="/" class="header__link">Artives</a>
          <a href="/" class="header__link">About <img src="./assets/icons/header/arrow.svg" alt=""></a>
        </nav>
      </div>
      <div class="header__container">
        <div class="header__buttons">
          <button class="header__button">
            <img src="./assets/icons/header/search.svg" alt="search">
          </button>
          <button class="header__button">
            <img src="./assets/icons/header/profile.svg" alt="profile">
          </button>
          <button class="header__button">
            <img src="./assets/icons/header/cart.svg" alt="cart">
            <span class="header__button_counter">2</span>
          </button>
        </div>
        <button class="header__button_main">Start testing</button>
      </div>
    </header>
  </section>
</body>

</html>
